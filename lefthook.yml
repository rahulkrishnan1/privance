pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{js,ts,tsx,jsx,json}"
      run: pnpm biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true

pre-push:
  parallel: false
  commands:
    typecheck:
      run: pnpm -r run typecheck
    test:
      run: pnpm -r run test
    audit:
      run: pnpm audit --audit-level=high
