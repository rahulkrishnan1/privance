# Production/self-host: copy this file to the deploy directory (e.g. ~/privance)
# and run `docker compose -f compose.prod.yaml up -d` from there. Local builds
# run from infra/ so the build contexts (..) resolve to the repo root.
#
# Image names use two optional env vars so the same file serves both local builds
# and pulled releases. Defaults produce local image names (suitable for
# `docker compose build`). For production / self-hosting, set PRIVANCE_IMAGE_PREFIX
# (e.g. ghcr.io/<owner>/privance) and PRIVANCE_VERSION in an untracked .env file
# placed beside this compose file.

# Pin the project name so volumes and container names do not depend on the
# directory the stack is launched from. COMPOSE_PROJECT_NAME in .env overrides
# this (used by stacks whose volumes predate the pin).
name: privance

services:

  server:
    build:
      context: ..
      dockerfile: server/Dockerfile
    image: ${PRIVANCE_IMAGE_PREFIX:-privance}-server:${PRIVANCE_VERSION:-latest}
    env_file:
      - ${PRIVANCE_ENV_DIR:-/etc/privance/env.d}/server.env
    environment:
      PRIVANCE_SECRETS_DIR: /run/secrets
    volumes:
      - "${PRIVANCE_ENV_DIR:-/etc/privance/env.d}/postgres_password:/run/secrets/postgres_password:ro"
    networks:
      - privance_net
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      server-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  server-migrate:
    image: ${PRIVANCE_IMAGE_PREFIX:-privance}-server:${PRIVANCE_VERSION:-latest}
    command: ["bun", "run", "db:migrate"]
    restart: "no"
    env_file:
      - ${PRIVANCE_ENV_DIR:-/etc/privance/env.d}/server.env
    volumes:
      - "${PRIVANCE_ENV_DIR:-/etc/privance/env.d}/postgres_password:/run/secrets/postgres_password:ro"
    networks:
      - privance_net
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine@sha256:979c4379dd698aba0b890599a6104e082035f98ef31d9b9291ec22f2b13059ca
    env_file:
      - ${PRIVANCE_ENV_DIR:-/etc/privance/env.d}/postgres.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - "${PRIVANCE_ENV_DIR:-/etc/privance/env.d}/postgres_password:/run/secrets/postgres_password:ro"
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - privance_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U privance -d privance -q"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  caddy:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    image: ${PRIVANCE_IMAGE_PREFIX:-privance}-web:${PRIVANCE_VERSION:-latest}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    env_file:
      - ${PRIVANCE_ENV_DIR:-/etc/privance/env.d}/caddy.env
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    networks:
      - privance_net
    restart: unless-stopped
    depends_on:
      - server

  restic-runner:
    # Backups are opt-in: without COMPOSE_PROFILES=backups in .env this service
    # (and its required restic.env + restic_password files) does not exist, so a
    # stack without B2 still boots.
    profiles: ["backups"]
    build:
      context: ./restic-runner
      dockerfile: Dockerfile
    image: ${PRIVANCE_IMAGE_PREFIX:-privance}-restic-runner:${PRIVANCE_VERSION:-latest}
    env_file:
      - ${PRIVANCE_ENV_DIR:-/etc/privance/env.d}/restic.env
    environment:
      TZ: UTC
    volumes:
      - "${PRIVANCE_ENV_DIR:-/etc/privance/env.d}/restic_password:/run/secrets/restic_password:ro"
      - "${PRIVANCE_ENV_DIR:-/etc/privance/env.d}/postgres_password:/run/secrets/postgres_password:ro"
      - "restic_cache:/root/.cache/restic"
    networks:
      - privance_net
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  restic_cache:

networks:
  privance_net:
