version: 2
updates:
  # pnpm-lock.yaml is consumed by dependabot's npm ecosystem.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      # Minor and patch bumps land as two consolidated PRs (prod, dev) so a
      # week's routine updates share one lockfile and one CI run each. Majors
      # stay individual for review.
      production:
        dependency-type: production
        update-types:
          - minor
          - patch
      development:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      actions:
        update-types:
          - minor
          - patch
