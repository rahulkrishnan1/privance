name: Docker smoke

# Catches broken Dockerfiles and compose config before release time: release.yml
# only runs on version tags, so without this the first CI build of an image
# would happen during a release.
on:
  pull_request:
    paths:
      - "server/Dockerfile"
      - "apps/web/Dockerfile"
      - "infra/restic-runner/**"
      - "infra/compose.prod.yaml"
      - ".dockerignore"
      - "pnpm-lock.yaml"
      - ".github/workflows/docker-smoke.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: privance-server
            context: .
            dockerfile: server/Dockerfile
          - name: privance-web
            context: .
            dockerfile: apps/web/Dockerfile
          - name: privance-restic-runner
            context: infra/restic-runner
            dockerfile: infra/restic-runner/Dockerfile

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build (no push)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  # Validate compose.prod.yaml resolves with both default and registry-style variables.
  compose-config:
    name: Validate compose config
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate compose.prod.yaml
        run: |
          STUB=$(mktemp -d)
          touch "$STUB"/server.env "$STUB"/postgres.env "$STUB"/caddy.env "$STUB"/restic.env "$STUB"/postgres_password "$STUB"/restic_password
          PRIVANCE_ENV_DIR="$STUB" docker compose -f infra/compose.prod.yaml config --quiet
          # COMPOSE_PROFILES=backups so the profiled restic-runner service is validated too.
          PRIVANCE_ENV_DIR="$STUB" COMPOSE_PROFILES=backups PRIVANCE_IMAGE_PREFIX=ghcr.io/example/privance PRIVANCE_VERSION=v0.0.0 \
            docker compose -f infra/compose.prod.yaml config --quiet
