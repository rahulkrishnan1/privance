name: Release

# Semver-shaped tags only: the metadata-action semver patterns below emit zero
# image tags for refs like "vtest", which would burn a full multi-arch build and
# publish nothing usable.
on:
  push:
    tags: ["v*.*.*"]

# Cancel any in-progress release run for the same tag (e.g. a re-push).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  # ---------------------------------------------------------------------------
  # Build and push all three images to GHCR on a version tag.
  #
  # arm64 builds run under QEMU emulation and add significant time (bun + QEMU
  # is slow). If arm64 proves consistently flaky, drop it to amd64 only here;
  # the production VPS is amd64 and does not need arm64.
  # ---------------------------------------------------------------------------
  build-push:
    name: Build and push ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: privance-server
            context: .
            dockerfile: server/Dockerfile
          - name: privance-web
            context: .
            dockerfile: apps/web/Dockerfile
          - name: privance-restic-runner
            context: infra/restic-runner
            dockerfile: infra/restic-runner/Dockerfile

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}
          # latest is added automatically for non-prerelease semver tags
          # (flavor latest=auto), so an rc tag never moves latest.
          # The v prefix is kept so image tags equal the git tag verbatim;
          # {{version}} alone strips it, which broke the first deploy
          # (compose pulled :v0.1.0, the registry had :0.1.0).
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
